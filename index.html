<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Key System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="tab-buttons">
        <button class="tab-btn active" id="tab-user-btn" onclick="switchTab('user')">USER</button>
        <button class="tab-btn" id="tab-admin-btn" onclick="switchTab('admin')">ADMIN</button>
    </div>

    <div id="user-section" class="section active">
        <h2>Key Generator</h2>
        <p class="instruction">Get your unique access key below.</p>
        <div class="key-display" id="userKeyBox">--- READY ---</div>
        <button class="main-btn" id="btnGetKey" onclick="getKeyFromDB()">GET NEW KEY</button>
        <p id="msg"></p>
        <div class="stats">Available in stock: <span id="userKeyCount">0</span> keys</div>
    </div>

    <div id="admin-section" class="section">
        <h2>Admin Access</h2>
        <div id="admin-login">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="adminUser" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="adminPwd" placeholder="Enter password" onkeypress="handleEnter(event)">
                    <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>
            <button class="main-btn" onclick="verifyAdmin()">AUTHORIZE</button>
            <p id="loginError" class="error-text"></p>
        </div>

        <div id="admin-content" style="display: none;">
            <p class="instruction">Insert keys (one per line):</p>
            <textarea id="adminInput" rows="6" placeholder="KEY-123..."></textarea>
            <button class="main-btn" style="margin-top: 15px;" onclick="addKeysToDB()">UPLOAD KEYS</button>
            <div class="stats">Inventory Total: <span id="adminKeyCount">0</span></div>
            <button class="tab-btn logout-btn" onclick="logoutAdmin()">SECURE LOGOUT</button>
        </div>
    </div>
</div>

<script>
    // --- 1. FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        databaseURL: "https://key-bloodstrike-c140b-default-rtdb.asia-southeast1.firebasedatabase.app/" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- 2. CREDENTIALS ---
    const AUTH = {
        user: "Hiroki",
        pass: "Vanlich201106@"
    };

    // --- 3. AUTO CLEANUP EXPIRED KEYS (AFTER 23:59 VN TIME) ---
    async function autoCleanupExpiredKeys() {
        const now = new Date();
        const todayStr = now.toLocaleDateString('en-GB', { timeZone: 'Asia/Ho_Chi_Minh' });
        const lastCleanup = localStorage.getItem('lastCleanupDate');
        
        if (lastCleanup !== todayStr) {
            await database.ref('keys').remove();
            localStorage.setItem('lastCleanupDate', todayStr);
            console.log("System cleaned up expired data.");
        }
    }

    // --- 4. PASSWORD VISIBILITY TOGGLE ---
    function togglePasswordVisibility() {
        const pwdInput = document.getElementById('adminPwd');
        const eyeIcon = document.getElementById('eyeIcon');
        if (pwdInput.type === "password") {
            pwdInput.type = "text";
            eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            pwdInput.type = "password";
            eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // --- 5. CORE LOGIC ---
    autoCleanupExpiredKeys();

    function switchTab(tab) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + '-section').classList.add('active');
        document.getElementById('tab-' + tab + '-btn').classList.add('active');
    }

    function verifyAdmin() {
        const u = document.getElementById('adminUser').value;
        const p = document.getElementById('adminPwd').value;
        const err = document.getElementById('loginError');
        if (u === AUTH.user && p === AUTH.pass) {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            err.innerText = '';
        } else {
            err.innerText = 'Invalid credentials. Please try again.';
        }
    }

    function handleEnter(e) { if (e.key === 'Enter') verifyAdmin(); }

    function logoutAdmin() {
        document.getElementById('admin-login').style.display = 'block';
        document.getElementById('admin-content').style.display = 'none';
        document.getElementById('adminUser').value = '';
        document.getElementById('adminPwd').value = '';
        const pwdInput = document.getElementById('adminPwd');
        const eyeIcon = document.getElementById('eyeIcon');
        pwdInput.type = "password";
        eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
    }

    database.ref('keys').on('value', snap => {
        const count = snap.numChildren();
        document.getElementById('userKeyCount').innerText = count;
        document.getElementById('adminKeyCount').innerText = count;
    });

    function addKeysToDB() {
        const val = document.getElementById('adminInput').value.trim();
        if (!val) return;
        const keys = val.split('\n');
        keys.forEach(k => {
            if(k.trim()) database.ref('keys').push({ value: k.trim() });
        });
        document.getElementById('adminInput').value = "";
        alert("Keys uploaded successfully!");
    }

    function getKeyFromDB() {
        const btn = document.getElementById('btnGetKey');
        const box = document.getElementById('userKeyBox');
        const msg = document.getElementById('msg');

        const lastClaimDate = localStorage.getItem('lastClaimDate');
        const today = new Date().toLocaleDateString('en-GB', { timeZone: 'Asia/Ho_Chi_Minh' });

        if (lastClaimDate === today) {
            msg.innerText = "ALREADY CLAIMED TODAY. PLEASE RETURN TOMORROW!";
            msg.style.color = "var(--error)";
            return;
        }

        btn.disabled = true;
        msg.innerText = "Accessing Database...";
        msg.style.color = "var(--text-muted)";

        database.ref('keys').limitToFirst(1).once('value').then(snap => {
            if (snap.exists()) {
                const id = Object.keys(snap.val())[0];
                const key = snap.val()[id].value;
                
                box.innerText = key;
                msg.innerText = "ACCESS GRANTED";
                msg.style.color = "var(--primary)";
                
                localStorage.setItem('lastClaimDate', today);
                database.ref('keys/' + id).remove();
            } else {
                box.innerText = "EMPTY";
                msg.innerText = "OUT OF STOCK!";
                msg.style.color = "var(--error)";
            }
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
